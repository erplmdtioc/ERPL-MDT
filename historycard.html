<!DOCTYPE html>
<html>

<head>
<title>EQUIPMENT HISTORY CARD</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background-image:url("background.jpeg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(255,255,255,0.85);
min-height:100vh;
padding-bottom:40px;
}

.header{
text-align:center;
padding:25px;
}

.logo{
width:110px;
}

h1{
color:#002060;
margin-top:10px;
font-size:36px;
}

.container{
width:1100px;
margin:auto;
text-align:center;
}

.button-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
background:#0b6efd;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#084298;
transform:translateY(-2px);
}


/* Viewer Box */

.viewer{
margin-top:20px;
padding:25px;
background:white;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
display:none;
}

.viewer h3{
margin-top:0;
color:#002060;
}

iframe{
width:100%;
height:600px;
border:none;
border-radius:8px;
}

</style>


<script>

function showSheet(name, link){

document.getElementById("viewer").style.display="block";

document.getElementById("title").innerText = name;

document.getElementById("excelFrame").src = link;

}

</script>

</head>

<body>

<div class="overlay">

<div class="header">

<img src="iocl.png" class="logo">

<h1>EQUIPMENT HISTORY CARD</h1>

</div>

<div class="container">


<div class="button-container">

<button onclick="showSheet('ACB-1','https://indianoilworkplace-my.sharepoint.com/...')">ACB-1</button>

<!-- KEEP YOUR EXISTING BUTTONS (NO CHANGE REQUIRED) -->

</div>


<!-- Viewer Box -->

<div class="viewer" id="viewer">

<h3 id="title"></h3>

<br>

<iframe id="excelFrame"></iframe>

</div>


</div>

</div>

</body>

</html>
