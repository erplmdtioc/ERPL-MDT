<!DOCTYPE html>
<html>

<head>
<title>EQUIPMENT LIVE DATA</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background-image:url("background.jpeg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(255,255,255,0.85);
min-height:100vh;
padding-bottom:40px;
}

.header{
text-align:center;
padding:25px;
}

.logo{
width:110px;
}

h1{
color:#002060;
margin-top:10px;
font-size:36px;
}

.container{
width:1100px;
margin:auto;
text-align:center;
}

.button-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
background:#0b6efd;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#084298;
transform:translateY(-2px);
}


/* Viewer Box */

.viewer{
margin-top:20px;
padding:25px;
background:white;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
display:none;
}

.viewer h3{
margin-top:0;
color:#002060;
}

.openBtn{
padding:12px 25px;
background:#198754;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.openBtn:hover{
background:#157347;
}

</style>


<script>

function showSheet(name, link){

document.getElementById("viewer").style.display="block";

document.getElementById("title").innerText = name;

document.getElementById("openBtn").onclick = function(){
window.open(link);
}

}

</script>

</head>

<body>

<div class="overlay">

<div class="header">

<img src="iocl.png" class="logo">

<h1>EQUIPMENT LIVE DATA</h1>

</div>

<div class="container">


<div class="button-container">

<button onclick="showSheet('ACB-1','https://indianoilworkplace-my.sharepoint.com/:x:/g/personal/dasbj1_indianoil_in/IQAhKv-BezntRZ3dOPyEFGFZAUA8Nke6kKzIUfVDkj_mq-0?e=55soph')">ACB-1</button>
<button onclick="showSheet('ACB-2','PASTE_LINK_HERE')">ACB-2</button>

<button onclick="showSheet('AC-01','PASTE_LINK_HERE')">AC-01</button>
<button onclick="showSheet('AC-02','PASTE_LINK_HERE')">AC-02</button>
<button onclick="showSheet('AC-03','PASTE_LINK_HERE')">AC-03</button>

<button onclick="showSheet('DG-01','PASTE_LINK_HERE')">DG-01</button>
<button onclick="showSheet('DG-02','PASTE_LINK_HERE')">DG-02</button>

<button onclick="showSheet('MP-01','PASTE_LINK_HERE')">MP-01</button>
<button onclick="showSheet('MP-02','PASTE_LINK_HERE')">MP-02</button>
<button onclick="showSheet('MP-03','PASTE_LINK_HERE')">MP-03</button>

<button onclick="showSheet('FF-04','PASTE_LINK_HERE')">FF-04</button>
<button onclick="showSheet('FF-05','PASTE_LINK_HERE')">FF-05</button>

</div>


<!-- Viewer Box -->

<div class="viewer" id="viewer">

<br>

<button class="openBtn" id="openBtn">
Open Excel Sheet
</button>

</div>


</div>

</div>

</body>

</html>
